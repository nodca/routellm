[server]
bind_addr = "0.0.0.0:8080"
database_url = "sqlite://metapi-state.db"
request_timeout_secs = 90
master_key = "sk-metapi-change-me"

[routing]
default_cooldown_seconds = 300

[routing.cooldowns]
auth_error = 1800
rate_limited = 45
upstream_server_error = 300
transport_error = 30
edge_blocked = 1800
upstream_path_error = 1800
unknown_error = 300

[routing.manual_intervention]
auth_error = true
upstream_path_error = true

[[routes]]
model = "gpt-5.4"
cooldown_seconds = 300

[[routes.channels]]
base_url = "https://api.example.com/v1"
api_key = "sk-example-primary"
upstream_model = "gpt-5.4"
priority = 0
weight = 10
enabled = true

[[routes.channels]]
base_url = "https://api-backup.example.com/v1"
api_key = "sk-example-backup"
upstream_model = "gpt-5-4"
priority = 1
weight = 5
enabled = true

[[routes]]
model = "gpt-4.1"

[[routes.channels]]
base_url = "https://api.example.com/v1"
api_key = "sk-example-primary"
upstream_model = "gpt-4.1"
priority = 0
weight = 10
enabled = true
